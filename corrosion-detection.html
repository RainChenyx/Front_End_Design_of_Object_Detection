<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腐蚀检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background-color: #1a56db;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }
        
        .header .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .header .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-between;
        }
        
        .upload-section {
            flex: 1;
            min-width: 300px;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .upload-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #1a56db;
        }
        
        .file-upload {
            position: relative;
            border: 2px dashed #1a56db;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .file-upload:hover {
            border-color: #0f348a;
            background-color: rgba(26, 86, 219, 0.05);
        }
        
        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-upload label {
            display: block;
            cursor: pointer;
        }
        
        .file-upload i {
            font-size: 48px;
            color: #1a56db;
            margin-bottom: 15px;
        }
        
        .file-upload p {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .file-upload small {
            font-size: 12px;
            color: #999;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a56db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn:hover {
            background-color: #0f348a;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            flex: 1;
            min-width: 300px;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .result-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #1a56db;
        }
        
        .image-container {
            position: relative;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container img {
            max-width: 100%;
            max-height: 400px;
        }
        
        .result-info {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
        }
        
        .result-info h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .detection-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .detection-item:last-child {
            border-bottom: none;
        }
        
        .detection-item .label {
            font-weight: bold;
        }
        
        .detection-item .confidence {
            color: #1a56db;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.show {
            display: block;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a56db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .footer p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>腐蚀检测</h1>
            <a href="index.html" class="back-btn">返回主页</a>
        </div>
        
        <div class="content">
            <div class="upload-section">
                <h2>上传图片</h2>
                <div class="file-upload">
                    <input type="file" id="fileInput" accept="image/*">
                    <label for="fileInput">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>点击或拖拽图片到此处</p>
                        <small>支持 JPG、PNG、JPEG 格式</small>
                    </label>
                </div>
                <button class="btn" id="detectBtn" disabled>开始检测</button>
            </div>
            
            <div class="result-section">
                <h2>检测结果</h2>
                <div class="image-container" id="imageContainer">
                    <p>请上传图片并点击开始检测</p>
                </div>
                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <p>正在检测中...</p>
                </div>
                <div class="result-info" id="resultInfo" style="display: none;">
                    <h3>检测结果</h3>
                    <div id="detectionResults"></div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 安全检测系统 | 基于YOLO模型</p>
        </div>
    </div>
    
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script>
        // 获取DOM元素
        const fileInput = document.getElementById('fileInput');
        const detectBtn = document.getElementById('detectBtn');
        const imageContainer = document.getElementById('imageContainer');
        const loading = document.getElementById('loading');
        const resultInfo = document.getElementById('resultInfo');
        const detectionResults = document.getElementById('detectionResults');
        
        // 存储上传的图片
        let uploadedImage = null;
        
        // 监听文件上传
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 创建图片预览
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImage = e.target.result;
                    imageContainer.innerHTML = `<img src="${uploadedImage}" alt="上传的图片">`;
                    detectBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 模拟YOLO模型检测 - 腐蚀检测
        function simulateYOLODetection() {
            // 模拟检测结果
            const detectionResults = [
                { label: '腐蚀', confidence: '90.5%' },
                { label: '轻微腐蚀', confidence: '85.3%' },
                { label: '中度腐蚀', confidence: '78.9%' },
                { label: '严重腐蚀', confidence: '65.7%' }
            ];
            
            // 模拟延迟
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(detectionResults);
                }, 2000);
            });
        }
        
        // 开始检测
        detectBtn.addEventListener('click', async function() {
            if (!uploadedImage) return;
            
            // 显示加载状态
            loading.classList.add('show');
            resultInfo.style.display = 'none';
            
            // 模拟YOLO模型检测
            const results = await simulateYOLODetection();
            
            // 隐藏加载状态
            loading.classList.remove('show');
            
            // 显示检测结果
            displayResults(results);
        });
        
        // 显示检测结果
        function displayResults(results) {
            detectionResults.innerHTML = '';
            
            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'detection-item';
                item.innerHTML = `
                    <span class="label">${result.label}</span>
                    <span class="confidence">${result.confidence}</span>
                `;
                detectionResults.appendChild(item);
            });
            
            resultInfo.style.display = 'block';
        }
    </script>
</body>
</html>
